services:
  linuxbackup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linuxbackup
    image: linuxbackup:latest
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"

    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATA_DIR=/data

    volumes:
      # Persistent data — backups, restores, job DB
      - linuxbackup_data:/data

      # ─────────────────────────────────────────────────────────────────────────
      # HOST FILESYSTEM ACCESS (uncomment as needed)
      # ─────────────────────────────────────────────────────────────────────────

      # Mount specific host directories for backup source
      # - /home:/mnt/host/home:ro
      # - /var:/mnt/host/var:ro
      # - /etc:/mnt/host/etc:ro
      # - /opt:/mnt/host/opt:ro

      # Mount a destination outside the container (e.g. external drive)
      # - /mnt/external:/mnt/external

      # ─────────────────────────────────────────────────────────────────────────
      # BLOCK DEVICE ACCESS for disk image backup (uncomment for image mode)
      # WARNING: Grants access to host block devices — use with caution
      # ─────────────────────────────────────────────────────────────────────────
      # - /dev:/dev

    # Required for block device access and SIGSTOP/SIGCONT (pause/resume)
    # Uncomment for disk image backup:
    # privileged: true

    # OR use targeted capabilities instead of full privileged:
    cap_add:
      - SYS_RAWIO      # for dd on block devices
      - SYS_PTRACE     # for process inspection
    # devices:
    #   - /dev/sda:/dev/sda    # specific disk passthrough

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

    # Logging
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  linuxbackup_data:
    driver: local
